server.port=8090
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
bank.simulator.url=http://localhost:8080

management.endpoint.health.probes.enabled=true
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.group.readiness.include=readinessState,circuitBreakers

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.metrics.tags.application=${spring.application.name:payment-gateway}

resilience4j.circuitbreaker.instances.bank.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bank.sliding-window-size=10
resilience4j.circuitbreaker.instances.bank.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bank.wait-duration-in-open-state=10s

resilience4j.ratelimiter.instances.bank.limit-for-period=10
resilience4j.ratelimiter.instances.bank.limit-refresh-period=1s
resilience4j.ratelimiter.instances.bank.timeout-duration=0
